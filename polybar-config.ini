; Catppuccin Mocha — Polybar config
; Place at ~/.config/polybar/config.ini
; Launch with: polybar catppuccin &
; Or add to ~/.fluxbox/startup:
;   sleep 1 && polybar catppuccin &

; ──────────────────────────────────────────
;  COLOUR PALETTE  (Mocha + Mauve accent)
; ──────────────────────────────────────────
[colors]
base      = #1e1e2e
mantle    = #181825
crust     = #11111b
surface0  = #313244
surface1  = #45475a
surface2  = #585b70
overlay0  = #6c7086
overlay1  = #7f849c
overlay2  = #9399b2
text      = #cdd6f4
subtext1  = #bac2de
subtext0  = #a6adc8
mauve     = #cba6f7
lavender  = #b4befe
blue      = #89b4fa
sapphire  = #74c7ec
sky       = #89dceb
teal      = #94e2d5
green     = #a6e3a1
yellow    = #f9e2af
peach     = #fab387
maroon    = #eba0ac
red       = #f38ba8
pink      = #f5c2e7
flamingo  = #f2cdcd
rosewater = #f5e0dc

; ──────────────────────────────────────────
;  BAR DEFINITION
; ──────────────────────────────────────────
[bar/catppuccin]
; Adjust monitor name as needed (run: polybar --list-monitors)
; monitor = eDP-1
width             = 100%
height            = 28
offset-x          = 0
offset-y          = 0
radius            = 0
fixed-center      = true

background        = ${colors.base}
foreground        = ${colors.text}

line-size         = 2
line-color        = ${colors.mauve}

border-size       = 0
border-color      = ${colors.crust}

padding-left      = 1
padding-right     = 1
module-margin     = 1

separator         = 
separator-foreground = ${colors.surface1}

font-0 = "Sans:size=9;2"
font-1 = "Font Awesome 6 Free:style=Solid:size=9;2"
font-2 = "Font Awesome 6 Brands:size=9;2"
font-3 = "Noto Color Emoji:scale=8;2"

; Adjust these to your actual module positions
modules-left   = ewmh xwindow
modules-center = date
modules-right  = cpu memory filesystem pulseaudio wlan eth

tray-position  = right
tray-padding   = 4
tray-background = ${colors.mantle}

; For Fluxbox — no compositor needed, but if you run picom:
; wm-restack = generic

; ──────────────────────────────────────────
;  MODULES
; ──────────────────────────────────────────

[module/ewmh]
; Shows Fluxbox workspaces
type             = internal/xworkspaces
pin-workspaces   = false
enable-click     = true
enable-scroll    = true

label-active            = %name%
label-active-foreground = ${colors.mauve}
label-active-background = ${colors.surface0}
label-active-underline  = ${colors.mauve}
label-active-padding    = 2

label-occupied          = %name%
label-occupied-foreground = ${colors.subtext1}
label-occupied-padding  = 2

label-urgent            = %name%
label-urgent-foreground = ${colors.red}
label-urgent-padding    = 2

label-empty             = %name%
label-empty-foreground  = ${colors.overlay0}
label-empty-padding     = 2

[module/xwindow]
type             = internal/xwindow
label            = %title:0:60:…%
label-foreground = ${colors.subtext0}
label-padding    = 1

[module/date]
type             = internal/date
interval         = 5
date             =  %a %d %b
time             =  %H:%M
label            = %date%  %time%
label-foreground = ${colors.text}
label-font       = 1

[module/cpu]
type             = internal/cpu
interval         = 2
label            =  %percentage:2%%
label-foreground = ${colors.blue}

[module/memory]
type             = internal/memory
interval         = 3
label            =  %percentage_used:2%%
label-foreground = ${colors.mauve}

; Warn colour when memory >80%
label-warn       =  %percentage_used:2%%
label-warn-foreground = ${colors.red}
warn-percentage  = 80

[module/filesystem]
type             = internal/fs
interval         = 30
mount-0          = /
label-mounted    =  %free%
label-mounted-foreground = ${colors.green}
label-unmounted  = %mountpoint% N/A
label-unmounted-foreground = ${colors.overlay0}

[module/pulseaudio]
type             = internal/pulseaudio
use-ui-max       = false
label-volume     =  %percentage%%
label-volume-foreground = ${colors.yellow}
label-muted      =  mute
label-muted-foreground = ${colors.overlay0}
click-right      = pavucontrol &

[module/wlan]
type             = internal/network
; Change interface to match yours (run: ifconfig)
interface        = wlan0
interval         = 3
label-connected  =  %essid% %signal%%
label-connected-foreground = ${colors.teal}
label-disconnected =  
label-disconnected-foreground = ${colors.overlay0}

[module/eth]
type             = internal/network
interface        = em0
interval         = 3
label-connected  =  %local_ip%
label-connected-foreground = ${colors.sapphire}
label-disconnected =
label-disconnected-foreground = ${colors.overlay0}
